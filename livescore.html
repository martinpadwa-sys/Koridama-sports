<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Live Score - Koridama Sports</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .match {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .loading {
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  🔴 Live Match - Koridama Sports
</header>

<div class="container" id="live">
  <p class="loading">Mengambil data pertandingan...</p>
</div>

<script>
async function loadLive() {
  const box = document.getElementById("live");

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328");
    const data = await res.json();

    box.innerHTML = "";

    data.events.slice(0, 10).forEach(match => {
      const div = document.createElement("div");
      div.className = "match";

      div.innerHTML = `
        <div><b>${match.strEvent}</b></div>
        <div>${match.dateEvent} | ${match.strTime}</div>
      `;

      box.appendChild(div);
    });

  } catch (e) {
    box.innerHTML = "<p>Gagal load data live.</p>";
  }
}

loadLive();
</script>

</body>
</html>
