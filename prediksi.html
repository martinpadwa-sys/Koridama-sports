<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Prediksi AI - Koridama</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .bar {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin: 5px 0;
    }

    .fill {
      height: 100%;
      background: #22c55e;
    }
  </style>
</head>

<body>

<header>
  🔮 AI Prediksi (Smart Mode)
</header>

<div class="container">

  <div class="box">
    <h3>Brasil vs Argentina</h3>

    <p>Brasil Menang (berdasarkan form & gol)</p>
    <div class="bar"><div class="fill" style="width:65%"></div></div>

    <p>Seri</p>
    <div class="bar"><div class="fill" style="width:20%"></div></div>

    <p>Argentina</p>
    <div class="bar"><div class="fill" style="width:15%"></div></div>
  </div>

</div>

</body>
</html>
