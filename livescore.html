<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Live Score Pro - Koridama</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .match {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .match:hover {
      transform: scale(1.02);
    }

    .live {
      color: #22c55e;
      font-weight: bold;
    }

    .loading {
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  🔴 LIVE SCORE PRO - Koridama Sports
</header>

<div class="container" id="box">
  <p class="loading">Mengambil data pertandingan...</p>
</div>

<script>
async function loadLive() {
  const box = document.getElementById("box");

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328");
    const data = await res.json();

    box.innerHTML = "";

    data.events.slice(0, 10).forEach(match => {
      const div = document.createElement("div");
      div.className = "match";

      div.innerHTML = `
        <div class="live">● Jadwal / Live</div>
        <div><b>${match.strEvent}</b></div>
        <div>${match.dateEvent} | ${match.strTime}</div>
      `;

      box.appendChild(div);
    });

  } catch (err) {
    box.innerHTML = "<p>Gagal mengambil data.</p>";
  }
}

loadLive();

// 🔁 AUTO REFRESH tiap 60 detik
setInterval(loadLive, 60000);
</script>

</body>
</html>
