<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Klasemen - Koridama Sports</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      margin: 0;
    }

    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #0f172a;
      color: #38bdf8;
    }

    .loading {
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  🏆 Klasemen Liga - Koridama Sports
</header>

<div class="container" id="box">
  <p class="loading">Mengambil data klasemen...</p>
</div>

<script>
async function loadTable() {
  const box = document.getElementById("box");

  try {
    const res = await fetch("https://www.thesportsdb.com/api/v1/json/3/lookuptable.php?l=4328&s=2023-2024");
    const data = await res.json();

    box.innerHTML = "";

    let html = `
      <table>
        <tr>
          <th>Pos</th>
          <th>Tim</th>
          <th>Main</th>
          <th>Menang</th>
          <th>Seri</th>
          <th>Kalah</th>
          <th>Poin</th>
        </tr>
    `;

    data.table.forEach(team => {
      html += `
        <tr>
          <td>${team.intRank}</td>
          <td>${team.strTeam}</td>
          <td>${team.intPlayed}</td>
          <td>${team.intWin}</td>
          <td>${team.intDraw}</td>
          <td>${team.intLoss}</td>
          <td>${team.intPoints}</td>
        </tr>
      `;
    });

    html += `</table>`;
    box.innerHTML = html;

  } catch (e) {
    box.innerHTML = "<p>Gagal mengambil klasemen.</p>";
  }
}

loadTable();
</script>

</body>
</html>
